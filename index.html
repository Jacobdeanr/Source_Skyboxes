---
layout: default
title: Jacob Robbins' Skyboxes
---
<select id="time-select" aria-label="Select Time of Day">
    <optgroup label="Times of Day">
        <option value="">All Times</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
        <option value="Evening">Evening</option>
        <option value="Night">Night</option>
    </optgroup>
    <optgroup label="Other">
        <option value="Misc">Misc</option>
    </optgroup>
</select>

<select id="weather-select">
    <option value="">All Weather Conditions</option>
    <option value="Clear">Clear</option>
    <option value="Cloudy">Cloudy</option>
    <option value="Hazy">Hazy</option>
    <option value="Overcast">Overcast</option>
</select>

<div id="skybox-container">
    {% for skybox in site.data.categories %}
    <div class="skybox-item" data-categories="{{ skybox[1].categories | join: ',' }}">
        <h3>{{ skybox[0] | split: '.7z' | first }}</h3>
        <img src="{{ '/assets/images/thumbnails/' | relative_url }}{{ skybox[0] | split: '.7z' | first }}.jpg" alt="{{ skybox[0] | split: '.7z' | first }}">
        <a href="{{ '/skyboxes/' | relative_url }}{{ skybox[0] | split: '.7z' | first }}" class="btn">View Details</a>
    </div>
    {% endfor %}
</div>

<script src="{{ '/assets/js/filter-skyboxes.js' | relative_url }}"></script>
